services:
  - type: web
    name: fb-orders-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false  # ต้องตั้งค่าเองใน Render Dashboard
